<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Vertical line from center -->
  <line x1="100" y1="60" x2="100" y2="160" 
        stroke="#000" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Cross (X shape) -->
  <!-- Left diagonal of cross -->
  <line x1="70" y1="100" x2="130" y2="160" 
        stroke="#000" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Right diagonal of cross -->
  <line x1="130" y1="100" x2="70" y2="160" 
        stroke="#000" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Smooth curves connecting top of cross to top of vertical line -->
  <!-- Left curve -->
  <path d="M 70 100 Q 85 80 100 60" 
        fill="none" 
        stroke="#000" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
  <!-- Right curve -->
  <path d="M 130 100 Q 115 80 100 60" 
        fill="none" 
        stroke="#000" 
        stroke-width="10" 
        stroke-linecap="round"/>
  
</svg>